<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf 2026</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- navbar -->
    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <img src="./assets/logo.png" alt="DevConf Logo">
            </div>
            <div class="nav-menu">
                <ul>
                    <li><a class="nav-link" href="">Speakers</a></li>
                    <li><a class="nav-link" href="">Schedul</a></li>
                    <li><a class="nav-link" href="">Tracks</a></li>
                    <li><a class="nav-link" href="">Venue</a></li>
                    <li><a class="nav-link" href="">Blog</a></li>
                </ul>
            </div>
            <div class="nav-action">
                <button class="common-btn">Register Now</button>
            </div>
        </div>
    </nav>
    <!-- hero section -->
    <header>
        <div class="hero-container">
            <div class="hero-content">
                <h2 class="hero-title">Code. Connect. Create</h2>
                <p class="hero-description">Join 4,000+ engineers, founders, and builders at the premier developer
                    conference of 2026. Three days of cutting-edge talks, hands-on workshops, and meaningful
                    connections.</p>
                <div class="hero-btn-container">
                    <button class="common-btn">Register Now</button>
                </div>
            </div>
        </div>
    </header>
